version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gpucloud-postgres
    environment:
      POSTGRES_DB: gpucloud
      POSTGRES_USER: gpucloud
      POSTGRES_PASSWORD: gpucloud_secret_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpucloud"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gpucloud-redis
    command: redis-server --requirepass redis_secret_2026 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret_2026", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpucloud-api
    environment:
      DATABASE_URL: postgres://gpucloud:gpucloud_secret_2026@postgres:5432/gpucloud?sslmode=disable
      REDIS_URL: redis://:redis_secret_2026@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-me}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: gpucloud-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  grafana:
    image: grafana/grafana-oss:latest
    container_name: gpucloud-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
